<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:insert="~{layouts/main :: headtags}"></th:block>
  <style>
    .error-wrap { padding: 4rem 2rem; max-width: 560px; }
    .error-code { font-size: 72px; font-weight: 700; color: #002F61; line-height: 1; margin: 0 0 0.5rem; }
    .error-tagline { font-size: 20px; color: #007293; margin: 0 0 1rem; }
    .error-message { font-size: 14px; color: #666; margin: 0 0 2rem; }
    .error-note { font-size: 12px; color: #aaa; border-top: 1px solid #eee; padding-top: 1rem; }
  </style>
</head>
<body>
<th:block th:insert="~{layouts/main :: header}"></th:block>
<div class="container page-content">
	<img src="/img/godzilla.jpg" style="display:block;margin:50px auto;" alt="Godzilla">
  <div class="error-wrap">
    <!--/* <div class="error-code"></div> */-->
	<div class="error-tagline">
	<h1>AAAYYYYYHHHHHMMMMMMMMMMMMMM!!!!!!!!</h1>
	<p>Looks like Godzilla just stomped on this page and broke it. Sorry about that.</p>
	</div>
    <div class="error-message" th:text="${message}">Something went wrong.</div>
	<p>
	<a href="/" class="btn btn-primary">Take me home</a>
	</p>
	<div class="error-note">
		Status:
		<span th:text="${status}"></span>
	</div>
  </div>
</div>
<th:block th:insert="~{layouts/main :: footer}"></th:block>
</body>
</html>
